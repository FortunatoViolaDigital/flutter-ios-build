name: kash
description: A monthly and daily lottery app built with Flutter and Supabase.

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^1.10.9
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  flutter_hooks: ^0.20.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  lottie: ^2.6.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
