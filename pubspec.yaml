name: kash
description: A monthly and daily lottery app built with Flutter and Supabase.

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_strategy: ^0.2.0
  supabase_flutter: ^2.6.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  flutter_hooks: ^0.20.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  lottie: ^2.6.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5
  path: ^1.9.0
  mime: ^1.0.4
  share_plus: ^7.2.1
  app_links: ^6.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  sign_in_with_apple: ^6.1.0

flutter_launcher_icons:
  android: true
  ios: true
  adaptive_icon_foreground: "assets/image/icona.png"
  adaptive_icon_background: "#2A2418"
  image_path: "assets/image/icona.png"

flutter:
  uses-material-design: true

  assets:
    - assets/image/kash-logo-app.png
    - assets/animation/level_up.json
    - assets/animation/bonus.json
